name: Publish to npm

# Publishes the package when you create a GitHub Release.
# Auth uses npm "trusted publishing" (OIDC) — no NPM_TOKEN secret required.
# One-time setup on npmjs.com: package Settings → Publishing access →
#   Trusted Publishers → add this repo + workflow file (publish.yml).
# Release flow: bump "version" in package.json → commit → create a GitHub
#   Release whose tag matches (e.g. v0.1.0) → this workflow publishes.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
